{ type:'chapter', roman:'QB', num:'Question Bank', title:'Additional\nQuestion Bank', desc:'Linux Administration · Storage · Cloud Infrastructure · Advanced Topics' },

// QB Q1
{ type:'question', chap:'Question Bank', qbank:true, q:'QB1. Write a procedure to create a new user and adding it to a group.',
  intro:`In Linux, every resource (file, process, device) has an owner. Users and groups are the mechanism Linux uses to control who can access what. Proper user and group management is essential for system security. Linux has a root user (superuser with full access) and regular users with limited permissions based on their group memberships. Correctly assigning users to groups is a fundamental system administration task.`,
  steps:[
    { n:'Step 1', b:'Create a new user with the command: <span class="code-inline">sudo useradd username</span>. This creates the user account with default settings. To set a home directory, use: <span class="code-inline">sudo useradd -m username</span>. The <span class="code-inline">-m</span> flag ensures the user\'s home directory is created automatically under <span class="code-inline">/home/</span>.' },
    { n:'Step 2', b:'Set a password for the new user using: <span class="code-inline">sudo passwd username</span>. The system will prompt you to enter and confirm the password. A password is required for the user to log in. Use a strong password following your organization\'s password policy to ensure security.' },
    { n:'Step 3', b:'Create a new group using: <span class="code-inline">sudo groupadd groupname</span>. If the group already exists, skip this step. You can verify existing groups by checking the <span class="code-inline">/etc/group</span> file using <span class="code-inline">cat /etc/group</span> or searching with <span class="code-inline">grep groupname /etc/group</span>.' },
    { n:'Step 4', b:'Add the user to the group using: <span class="code-inline">sudo usermod -aG groupname username</span>. The <span class="code-inline">-aG</span> flag appends the user to the group without removing them from other groups. Omitting the <span class="code-inline">-a</span> flag would replace all existing group memberships, so always use <span class="code-inline">-aG</span> together.' },
    { n:'Step 5', b:'Verify the user was added correctly using: <span class="code-inline">groups username</span> or <span class="code-inline">id username</span>. This displays all groups the user belongs to. The user may need to log out and log back in for the new group membership to take effect in their current session.' },
    { n:'Step 6', b:'To set a specific home directory and shell, use: <span class="code-inline">sudo useradd -m -d /home/username -s /bin/bash username</span>. This gives the user a proper home folder and default shell for login. Specifying the shell explicitly ensures the user gets a proper interactive login environment.' }
  ]
},

// QB Q2
{ type:'question', chap:'Question Bank', qbank:true, q:'QB2. What is YUM?',
  intro:`YUM stands for Yellowdog Updater Modified. It is a package management tool used in Red Hat-based Linux distributions like CentOS, Fedora, and RHEL. YUM automatically handles software installation, updates, and removal along with all their dependencies, making software management much simpler than manual compilation. YUM has been largely succeeded by DNF in newer distributions, but it remains widely used on many production Linux systems.`,
  points:[
    { t:'What is YUM?', b:'YUM is a command-line package manager for RPM-based Linux distributions. It downloads and installs software packages from online repositories. It automatically resolves dependencies — if software A needs software B to work, YUM installs both automatically. This eliminates the manual dependency resolution that made early Linux software installation difficult.' },
    { t:'Installing Software', b:'To install a package, use: <span class="code-inline">yum install package-name</span>. YUM downloads the package from a configured repository and installs it along with all required dependencies without any manual intervention. YUM also verifies package integrity using GPG signatures before installation.' },
    { t:'Removing Software', b:'To remove a package, use: <span class="code-inline">yum remove package-name</span>. YUM uninstalls the software and can also remove packages that were installed as dependencies and are no longer needed by any other package. Use <span class="code-inline">yum autoremove</span> to automatically clean up unused dependency packages.' },
    { t:'Updating Software', b:'To update a specific package, use: <span class="code-inline">yum update package-name</span>. To update all installed packages to their latest versions, use: <span class="code-inline">yum update</span>. This keeps the system secure and up-to-date. Security updates should be applied regularly to protect against known vulnerabilities.' },
    { t:'YUM Repositories', b:'YUM downloads packages from repositories — online servers that host RPM packages. Repositories are configured in files under <span class="code-inline">/etc/yum.repos.d/</span>. You can add third-party repositories to install software not available in the default repos. EPEL (Extra Packages for Enterprise Linux) is a popular additional repository.' },
    { t:'YUM vs DNF', b:'In newer versions of Fedora and RHEL 8+, YUM has been replaced by DNF (Dandified YUM). DNF is faster and uses less memory than YUM. However, the syntax is almost identical, and many YUM commands still work in DNF through backward compatibility. DNF also provides a more robust dependency solver than YUM.' }
  ]
},

// QB Q3
{ type:'question', chap:'Question Bank', qbank:true, q:'QB3. Write a short note on Network File System (NFS).',
  intro:`NFS stands for Network File System. It is a distributed file system protocol developed by Sun Microsystems in 1984. NFS allows a computer (client) to access files stored on another computer (server) over a network as if those files were stored locally on the client's own hard drive. It is widely used in Linux and Unix environments for file sharing. NFS simplifies storage management by centralizing files on one server that multiple clients can access simultaneously.`,
  points:[
    { t:'What is NFS?', b:'NFS is a client-server protocol that enables file sharing over a network. The NFS server exports (shares) a directory, and NFS clients mount that directory over the network. To the user on the client machine, the remote files look exactly like local files. Applications do not need any modification to work with NFS-mounted directories.' },
    { t:'How NFS Works', b:'The NFS server exports directories by listing them in <span class="code-inline">/etc/exports</span>. Clients use the <span class="code-inline">mount</span> command to connect to the exported directory. All read/write operations are transparently sent over the network using RPC (Remote Procedure Calls). Permanent NFS mounts can be configured in <span class="code-inline">/etc/fstab</span> to survive reboots.' },
    { t:'Versions of NFS', b:'NFS has evolved through several versions. NFSv3 is stateless and widely supported. NFSv4 (current standard) adds better security through Kerberos authentication, works better through firewalls since it uses a single port, and improves performance for large file operations. NFSv4.1 introduced parallel NFS (pNFS) for even higher performance.' },
    { t:'Use Cases', b:'NFS is used in organizations to share home directories across multiple servers, provide shared storage for applications, enable Linux/Unix desktops to access central file servers, and serve VM disk images in virtualization environments like VMware. High Performance Computing (HPC) clusters commonly use NFS for shared storage access.' },
    { t:'Advantages of NFS', b:'NFS is easy to set up in Linux environments, allows multiple users to share files from one central location, reduces storage redundancy by having one copy of files instead of many, and is available by default on most Linux distributions without additional software. It significantly simplifies backup management by centralizing all files.' },
    { t:'Limitations', b:'NFS performance can be affected by network speed and latency. It is less suitable for high-performance applications like databases (iSCSI or SAN is better for that). Security in older NFS versions was weak, but NFSv4 with Kerberos provides much stronger authentication. NFS is also not ideal for applications requiring file locking across multiple clients.' }
  ]
},

// QB Q4
{ type:'question', chap:'Question Bank', qbank:true, q:'QB4. How to configure Cache NameServer.',
  intro:`A Caching Name Server (also called a Caching DNS Server) is a DNS server that stores (caches) the results of DNS queries it has previously answered. When the same hostname is looked up again, the server responds from its cache instead of querying the internet again. This speeds up DNS resolution and reduces network traffic. Caching DNS servers are used in organizations to improve name resolution speed for all internal users.`,
  steps:[
    { n:'Step 1', b:'Install the BIND package using: <span class="code-inline">sudo yum install bind bind-utils</span> (RHEL/CentOS) or <span class="code-inline">sudo apt install bind9</span> (Ubuntu/Debian). BIND is the most popular DNS software on Linux. The bind-utils package provides tools like <span class="code-inline">dig</span> and <span class="code-inline">nslookup</span> for testing DNS resolution.' },
    { n:'Step 2', b:'Open the main BIND configuration file: <span class="code-inline">/etc/named.conf</span> (or <span class="code-inline">/etc/bind/named.conf</span> on Ubuntu). This file controls how the DNS server behaves. Create a backup of the original file before making any changes: <span class="code-inline">cp /etc/named.conf /etc/named.conf.bak</span>.' },
    { n:'Step 3', b:'Configure the <span class="code-inline">listen-on</span> directive to specify the IP address and port where the DNS server listens. For a local cache server, set it to listen on <span class="code-inline">127.0.0.1</span> and the server\'s own IP. Set <span class="code-inline">recursion yes;</span> to allow the server to perform full DNS lookups on behalf of clients.' },
    { n:'Step 4', b:'Set the <span class="code-inline">allow-query</span> option to define which clients can use this DNS server. For a local network cache server, allow the local subnet (e.g., <span class="code-inline">allow-query { localhost; 192.168.1.0/24; };</span>). Restricting queries to known IP ranges prevents your DNS server from being abused by external users.' },
    { n:'Step 5', b:'Configure forwarders — upstream DNS servers to forward queries to when the cache doesn\'t have the answer. Example: <span class="code-inline">forwarders { 8.8.8.8; 8.8.4.4; };</span> uses Google\'s DNS servers as forwarders. You can also use your ISP\'s DNS servers as forwarders for potentially faster resolution within your network.' },
    { n:'Step 6', b:'Start and enable BIND: <span class="code-inline">sudo systemctl start named</span> and <span class="code-inline">sudo systemctl enable named</span>. Test by running <span class="code-inline">dig @localhost google.com</span> to verify the cache server is working. Check response time on repeated queries to confirm caching is functioning correctly.' }
  ]
},

// QB Q5
{ type:'question', chap:'Question Bank', qbank:true, q:'QB5. Write a short note on iSCSI.',
  intro:`iSCSI stands for Internet Small Computer System Interface. It is a storage protocol that allows SCSI (disk) commands to be sent over standard TCP/IP networks. This means storage devices like disk arrays can be accessed over regular Ethernet networks, making them appear as locally attached drives to the server. iSCSI is widely used for SAN (Storage Area Network) deployments, particularly in small and medium enterprises that cannot afford dedicated Fibre Channel infrastructure.`,
  points:[
    { t:'What is iSCSI?', b:'iSCSI is a block-level storage protocol that encapsulates SCSI commands in TCP/IP packets. This allows servers to access remote storage over Ethernet as if it were a directly attached local disk. It was developed by IBM and Cisco and became an IETF standard in 2003. Today it is the dominant protocol for IP-based SANs.' },
    { t:'Initiator and Target', b:'iSCSI uses a client-server model. The iSCSI Initiator is the client (server that wants storage). The iSCSI Target is the storage device (disk array or NAS). The initiator sends SCSI read/write commands to the target over the TCP/IP network. Each initiator and target is identified by a unique IQN (iSCSI Qualified Name).' },
    { t:'Block-Level Access', b:'Unlike NFS which provides file-level access, iSCSI provides block-level access. The server sees the remote storage as a raw disk which it can partition and format with any file system. This is important for applications like databases that need direct disk access. VMware uses iSCSI for VMFS datastores in smaller environments.' },
    { t:'Advantages', b:'iSCSI is cost-effective because it uses standard Ethernet infrastructure instead of expensive Fibre Channel hardware. It provides high performance for database and virtualization workloads, is easy to configure, and supports long-distance connectivity over IP networks. 10GbE and 25GbE networks provide enough bandwidth for most enterprise iSCSI workloads.' },
    { t:'Security', b:'iSCSI uses CHAP (Challenge Handshake Authentication Protocol) to authenticate initiators before granting storage access. For additional security, IPsec can be used to encrypt iSCSI traffic over the network, protecting against unauthorized access and eavesdropping. Dedicated VLANs for iSCSI traffic are also strongly recommended as a security best practice.' },
    { t:'iSCSI vs Fibre Channel', b:'Fibre Channel (FC) SAN offers lower latency and higher throughput than iSCSI but requires dedicated, expensive FC hardware and infrastructure. iSCSI runs on standard Ethernet, making it more affordable and suitable for small and medium businesses needing SAN storage. Modern 25GbE iSCSI setups can approach FC performance at a fraction of the cost.' }
  ]
},

// QB Q6
{ type:'question', chap:'Question Bank', qbank:true, q:'QB6. Explain Network-Attached Storage (NAS).',
  intro:`Network-Attached Storage (NAS) is a dedicated file storage device that connects to a network and provides data access to multiple clients simultaneously. Unlike a SAN which provides block-level storage, NAS works at the file level and is managed as a separate device on the network. It is simple to set up and widely used in homes, small businesses, and enterprises for centralized file storage. NAS devices have become increasingly powerful, with modern units supporting features like deduplication, snapshots, and cloud synchronization.`,
  points:[
    { t:'What is NAS?', b:'NAS is a standalone storage device that connects directly to a network (like a switch or router). It has its own OS, processor, and storage drives. Multiple computers on the network can access files stored on the NAS simultaneously using protocols like NFS (Linux) or SMB/CIFS (Windows). Popular NAS platforms include Synology, QNAP, and NetApp.' },
    { t:'File-Level Access', b:'NAS provides file-level storage — users access specific files and folders, not raw disk blocks. The NAS device manages its own file system. This is simpler than SAN but less suitable for performance-critical applications like large databases. File-level access makes NAS easy to use with any operating system without special client software.' },
    { t:'Protocols Used', b:'NAS uses standard file sharing protocols. NFS (Network File System) is used for Linux and Unix clients. SMB/CIFS (Server Message Block) is used for Windows clients. Some modern NAS devices support both protocols simultaneously for mixed environments. AFP was previously used for macOS clients but has largely been replaced by SMB.' },
    { t:'Use Cases', b:'NAS is used for centralized file storage and sharing, backup storage, media streaming (photos, videos), home directory storage for users, and as shared storage for small virtualization environments. Many small businesses use NAS as an affordable alternative to expensive enterprise SAN infrastructure.' },
    { t:'Advantages', b:'NAS is easy to set up and manage without specialized storage knowledge. It provides centralized storage accessible from many devices. It scales easily by adding more drives. It is cost-effective compared to SAN and supports multiple protocols simultaneously. Modern NAS devices also include built-in backup, cloud sync, and disaster recovery features.' },
    { t:'NAS vs SAN', b:'NAS provides file-level access over standard Ethernet and is simpler and cheaper. SAN provides block-level access over dedicated high-speed networks (Fibre Channel or iSCSI) and offers much higher performance. SAN is for high-performance databases; NAS is for general file sharing. Many organizations use both NAS and SAN for different storage needs.' }
  ]
},

// QB Q7
{ type:'question', chap:'Question Bank', qbank:true, q:'QB7. Explain the five Things to Consider for Cloud Backup and Disaster Recovery.',
  intro:`Cloud backup and disaster recovery (DR) ensures that an organization's data and systems can be restored quickly after a disaster, failure, or cyberattack. Moving backup and DR to the cloud offers many advantages over traditional tape or on-site backup, including faster recovery, lower cost, and geographic redundancy. However, careful planning is required to ensure backup strategies meet business continuity requirements and regulatory obligations.`,
  points:[
    { t:'1. Recovery Time Objective (RTO)', b:'RTO defines how quickly systems must be restored after a failure. Organizations must choose a cloud DR solution that meets their RTO requirements. Critical business systems may need to be restored in minutes, while less critical systems may tolerate hours of downtime. Modern cloud DR solutions like AWS Elastic Disaster Recovery can achieve RTO of minutes.' },
    { t:'2. Recovery Point Objective (RPO)', b:'RPO defines how much data loss is acceptable — measured as time. If the RPO is 1 hour, the organization can tolerate losing up to 1 hour of data. Cloud backup frequency (every hour, every 15 minutes) must be configured to match the RPO requirements. Continuous data protection solutions can reduce RPO to near zero for critical systems.' },
    { t:'3. Data Security and Encryption', b:'All backup data stored in the cloud must be encrypted both during transfer (in transit) and while stored (at rest). Organizations must verify that the cloud provider uses strong encryption (AES-256) and has access controls to prevent unauthorized access to backup data. Backup encryption keys should be managed separately from the cloud provider for maximum security.' },
    { t:'4. Cost of Storage and Recovery', b:'Cloud backup costs depend on storage used, data transfer fees, and retrieval charges. Organizations must calculate the total cost including egress fees when restoring large amounts of data. Some providers charge significantly more for data retrieval than for storage. Storage tiering (hot, warm, cold) can reduce costs by storing older backups in cheaper storage tiers.' },
    { t:'5. Testing and Verification', b:'A backup is useless if it cannot be restored. Organizations must regularly test their disaster recovery plan by actually running restore operations. Cloud DR solutions should be tested at least quarterly to ensure backups are valid and recovery procedures work correctly. Test results should be documented and any issues resolved before the next test cycle.' },
    { t:'Geographic Redundancy', b:'For true disaster recovery, backups should be stored in a different geographic region from the primary systems. Cloud providers offer multiple data center regions globally. Storing backups in a different region protects against regional disasters like floods or power failures. A 3-2-1 backup strategy (3 copies, 2 media types, 1 offsite) is the recommended baseline.' }
  ]
},

// QB Q8
{ type:'question', chap:'Question Bank', qbank:true, q:'QB8. Write a short note on Grid Computing.',
  intro:`Grid computing is a distributed computing model that connects multiple computers (often from different locations and organizations) to work together as one large virtual computer. It allows geographically dispersed resources to be used collectively to solve complex, large-scale computational problems. Grid computing was a predecessor to modern cloud computing and laid the conceptual groundwork for distributed resource sharing at scale.`,
  points:[
    { t:'What is Grid Computing?', b:'Grid computing links together hundreds or thousands of computers across different locations, organizations, or even countries into a unified computing grid. Each computer contributes its idle processing power to solve large computational tasks that would be too big for any single computer. This approach democratizes access to supercomputing-level resources.' },
    { t:'How It Works', b:'A large computation task is divided into smaller subtasks by middleware software. These subtasks are distributed to computers in the grid, which process them independently. Results are then collected and combined to form the final output. The BOINC framework (used in SETI@home) is a famous example of volunteer grid computing.' },
    { t:'Types of Grid', b:'There are two main types: Computational Grids (for processing-intensive tasks like scientific simulations) and Data Grids (for storing and accessing large datasets distributed across multiple locations). Both types use middleware to coordinate and manage distributed resources. The Open Grid Services Architecture (OGSA) is a common standard framework.' },
    { t:'Characteristics', b:'Grid computing is heterogeneous (different types of computers), geographically distributed, uses shared resources across organizational boundaries, and is used for large-scale parallel processing of scientific and research workloads that require massive computing power. Resource scheduling in grids must handle varying availability and reliability of participating machines.' },
    { t:'Applications', b:'Grid computing is used in scientific research (particle physics at CERN, climate modeling, drug discovery), financial analysis, weather forecasting, and bioinformatics. SETI@home used grid computing to analyze radio telescope data for signs of extraterrestrial intelligence. The LHC computing grid at CERN processes petabytes of particle collision data using thousands of computers worldwide.' },
    { t:'Grid vs Cloud Computing', b:'Grid computing connects heterogeneous computers from different organizations for specific large tasks, typically without billing. Cloud computing provides on-demand, standardized virtualized resources with pay-as-you-go pricing from a single provider\'s data center infrastructure. Cloud is more commercial and user-friendly; grid is more suited for research and scientific collaboration.' }
  ]
},

// QB Q9
{ type:'question', chap:'Question Bank', qbank:true, q:'QB9. Write a short note on Utility Computing.',
  intro:`Utility computing is a computing model where computing resources like processing power, storage, and network bandwidth are provided as a metered service — similar to how electricity or water is provided. Users pay only for the computing resources they actually consume, just like a utility bill. This concept is the direct predecessor of modern cloud computing and the foundational economic model behind AWS, Azure, and Google Cloud's pricing structure.`,
  points:[
    { t:'What is Utility Computing?', b:'Utility computing treats computing resources as a commodity service. Instead of buying and maintaining servers, organizations subscribe to computing services and pay based on their usage. The provider owns and manages the infrastructure; the customer just consumes and pays for it. This shifts IT from a capital investment to an operational expense.' },
    { t:'Pay-Per-Use Model', b:'The defining feature of utility computing is pay-per-use pricing. Organizations are billed based on how much CPU time, storage, or network bandwidth they consume — exactly like paying per kilowatt-hour of electricity. This eliminates wasted spending on idle infrastructure and aligns IT costs directly with actual business activity.' },
    { t:'Low Initial Cost', b:'Since there is no need to buy physical hardware, utility computing greatly reduces the initial investment required to start using computing resources. This makes powerful computing accessible to small businesses and startups that cannot afford expensive infrastructure. Organizations can begin with a small spend and scale up as their business grows.' },
    { t:'Infinite Scalability', b:'Utility computing allows customers to access as much or as little computing power as needed at any time. During peak demand, they can instantly access more resources. During quiet periods, they release those resources and stop paying for them. This elastic scalability is impossible with traditional owned-hardware infrastructure.' },
    { t:'Relationship to Cloud Computing', b:'Utility computing is the foundational concept behind cloud computing. Services like AWS EC2 (pay per hour of server use), AWS S3 (pay per GB of storage), and Azure (pay per CPU minute) are all practical implementations of the utility computing model. The cloud made utility computing accessible at global scale for any size organization.' },
    { t:'Advantages', b:'Utility computing reduces capital expenses, eliminates hardware maintenance costs, provides on-demand scalability, aligns IT costs with actual business usage, and allows organizations to focus on their core business instead of managing IT infrastructure. It also accelerates time-to-market for new products by eliminating lengthy hardware procurement cycles.' }
  ]
},

// QB Q10
{ type:'question', chap:'Question Bank', qbank:true, q:'QB10. Write a short note on Cloud Infrastructure Components.',
  intro:`Cloud infrastructure refers to the collection of hardware and software components that work together to deliver cloud computing services. Understanding these components helps in designing, deploying, and managing cloud environments effectively. Cloud infrastructure consists of both physical components (data centers, servers) and virtual components (VMs, networks, storage). A solid understanding of cloud infrastructure is essential for cloud architects, developers, and administrators.`,
  points:[
    { t:'Compute Resources', b:'The compute layer includes physical servers with CPUs and RAM, which are virtualized into virtual machines (VMs) or containers. Cloud users rent these virtualized compute resources (called instances in AWS, VMs in Azure) to run their applications and workloads. Modern cloud compute also includes GPU instances for AI/ML workloads and Arm-based processors for cost-efficient computing.' },
    { t:'Storage Systems', b:'Cloud storage includes Object Storage (like AWS S3, for unstructured data like files and images), Block Storage (like AWS EBS, for databases and VMs), and File Storage (like AWS EFS, for shared file systems). Each type is optimized for different access patterns and workloads. Object storage is the most scalable form and can store virtually unlimited amounts of data.' },
    { t:'Networking', b:'Cloud networking includes virtual networks (VPC — Virtual Private Cloud), subnets, routing tables, firewalls (security groups), load balancers, and DNS services. These allow cloud resources to communicate securely with each other and with the internet. Software-defined networking (SDN) makes cloud networks highly programmable and easy to configure through APIs.' },
    { t:'Virtualization Layer', b:'Hypervisors (like KVM, VMware ESXi) form the virtualization layer that creates and manages virtual machines on physical servers. This layer is the core of cloud infrastructure, enabling multiple tenants to share the same physical hardware securely. Container runtimes like Docker add an additional lightweight virtualization layer for application packaging.' },
    { t:'Management and Automation', b:'Cloud infrastructure includes management planes — web consoles, CLIs (Command Line Interfaces), and APIs that allow users to provision and manage resources. Automation tools like Terraform and Ansible enable Infrastructure as Code (IaC) for automated, repeatable deployment. GitOps workflows allow infrastructure changes to be version-controlled and reviewed like application code.' },
    { t:'Data Centers', b:'All cloud infrastructure is hosted in physical data centers owned by cloud providers. These data centers have redundant power supplies, cooling systems, high-speed internet connections, and physical security. Cloud providers operate multiple data centers in different geographic regions for redundancy. Major providers maintain dozens of regions and hundreds of availability zones worldwide.' }
  ]
},

// QB Q11
{ type:'question', chap:'Question Bank', qbank:true, q:'QB11. Explain the technologies working behind cloud computing platforms.',
  intro:`Cloud computing relies on several underlying technologies that work together to make it flexible, reliable, and easy to use. These technologies are layered on top of each other to create the powerful cloud services that millions of organizations use today. Understanding these technologies helps explain why cloud computing is so transformative and why it continues to evolve rapidly as new innovations emerge.`,
  points:[
    { t:'Virtualization', b:'Virtualization is the most fundamental technology behind cloud computing. Hypervisors create multiple virtual machines from one physical server. This enables resource pooling, multi-tenancy, and the ability to provision new servers in seconds — all core features of cloud computing. Hardware-assisted virtualization (Intel VT-x, AMD-V) has made modern virtualization nearly as fast as running on bare metal.' },
    { t:'Distributed Computing', b:'Cloud platforms distribute workloads across thousands of servers in multiple data centers. Technologies like Apache Hadoop, Kubernetes, and distributed databases ensure data and processing are spread across many nodes for scalability, fault tolerance, and high availability. Distributed consensus algorithms like Raft and Paxos are used to maintain consistency across replicated data.' },
    { t:'Service-Oriented Architecture (SOA)', b:'Cloud services are built as independent, interoperable services that communicate through standard APIs. SOA enables cloud providers to build and update individual services (storage, compute, networking) independently without disrupting the entire platform. The evolution of SOA into microservices has made cloud platforms even more modular and resilient.' },
    { t:'Broadband Networking', b:'High-speed internet connectivity is essential for cloud computing. Advanced networking technologies including fiber optics, SDN (Software-Defined Networking), CDNs (Content Delivery Networks), and 5G enable fast, reliable access to cloud resources from anywhere in the world. Cloud providers invest heavily in their own global fiber networks for inter-datacenter connectivity.' },
    { t:'Automation and Orchestration', b:'Cloud platforms use automation technologies to handle provisioning, scaling, and management without human intervention. Tools like Kubernetes (for containers), Terraform (for infrastructure), and cloud-native auto-scaling ensure resources are automatically adjusted based on demand. AI-driven automation is increasingly used to predict capacity needs before demand spikes occur.' },
    { t:'Security Technologies', b:'Cloud security is maintained through multiple technologies: encryption (TLS, AES-256), Identity and Access Management (IAM), multi-factor authentication, intrusion detection systems, DDoS protection, and compliance monitoring tools that continuously scan for vulnerabilities. Zero-trust security models are now widely adopted in cloud environments to minimize the blast radius of security breaches.' }
  ]
},

// QB Q12
{ type:'question', chap:'Question Bank', qbank:true, q:'QB12. Explain in detail Cloud Computing Strategy Planning Phase.',
  intro:`The Cloud Computing Strategy Planning Phase is the first and most critical step before an organization migrates to the cloud. This phase involves analyzing the current IT environment, defining business objectives, assessing risks, and creating a detailed roadmap for cloud adoption. A well-planned strategy prevents costly mistakes and ensures a smooth cloud migration. Organizations that skip this phase often face cost overruns, security gaps, and failed migrations.`,
  points:[
    { t:'Business Objective Assessment', b:'The planning phase starts by defining clear business goals for cloud adoption. Organizations must answer why they want to move to cloud — is it to reduce costs, improve scalability, enable remote work, or accelerate application development? Goals guide all subsequent decisions. Without clear objectives, cloud migrations often lack direction and fail to deliver measurable value.' },
    { t:'Current Infrastructure Analysis', b:'Organizations must document their existing IT infrastructure — servers, applications, databases, networking, and storage. This inventory identifies which workloads are ready for cloud migration (cloud-native), which need modification, and which should remain on-premises (too complex or regulated). This analysis is called application portfolio assessment or workload discovery.' },
    { t:'Cloud Readiness Assessment', b:'A cloud readiness assessment evaluates the organization\'s technical capabilities, staff skills, security posture, and compliance requirements. It identifies gaps that need to be addressed — such as staff training, application refactoring, or security policy updates — before migration begins. Skills gaps are one of the most common obstacles to successful cloud adoption.' },
    { t:'Choosing the Right Cloud Model', b:'Based on security, cost, and workload requirements, the planning phase determines the right deployment model (public, private, hybrid) and service model (IaaS, PaaS, SaaS). The choice of cloud provider (AWS, Azure, GCP) is also made during this phase. A proof-of-concept (POC) with shortlisted providers is recommended before making a final commitment.' },
    { t:'Risk and Compliance Planning', b:'Organizations must identify risks associated with cloud migration including data privacy laws, vendor lock-in, data loss, and service outages. A risk mitigation plan and compliance framework must be established before any workloads are moved to the cloud. Legal counsel should be involved to review cloud contracts and data processing agreements.' },
    { t:'Migration Roadmap and Budget', b:'The final output of the planning phase is a detailed migration roadmap with priorities (which workloads to move first), timelines, resource requirements, and budget estimates. This roadmap becomes the guide for the deployment phase that follows. A phased migration approach starting with low-risk workloads is recommended to build experience and confidence before tackling critical systems.' }
  ]
},

// QB Q13
{ type:'question', chap:'Question Bank', qbank:true, q:'QB13. Explain in detail Cloud Computing Deployment Phase.',
  intro:`The Cloud Computing Deployment Phase is where the actual migration and implementation of cloud services takes place, following the strategy planning phase. This phase involves setting up the cloud environment, migrating workloads, testing, and going live. A systematic approach with proper testing at each step ensures a successful deployment. The deployment phase can take weeks to months depending on the complexity of the organization's IT environment.`,
  points:[
    { t:'Environment Setup', b:'The deployment phase begins with setting up the cloud environment — creating accounts, configuring Virtual Private Clouds (VPCs), setting up subnets, security groups, IAM roles, and connecting the cloud environment to on-premise systems through VPN or direct connect links. This foundation must be secure and well-architected before any workloads are migrated.' },
    { t:'Pilot Migration', b:'Before migrating everything, organizations first migrate a small, non-critical workload as a pilot. This tests the migration process, identifies problems, and builds team confidence. The pilot also validates that the planned architecture works correctly in the real cloud environment. Lessons learned from the pilot are used to refine the migration approach for subsequent workloads.' },
    { t:'Data Migration', b:'Data is migrated using cloud provider tools like AWS Database Migration Service or Azure Migrate. Large data migrations may require physical data transfer (shipping hard drives to the cloud provider). Data integrity is verified after migration using checksums and validation tests. Data migration is often the most complex and time-consuming part of a cloud deployment.' },
    { t:'Application Migration', b:'Applications are migrated using strategies like Lift and Shift (moving as-is), Replatforming (minor modifications), or Refactoring (rewriting for cloud-native). Each application is tested thoroughly after migration to verify it works correctly in the cloud environment. The right strategy depends on the application\'s architecture, age, and how much cloud optimization is desired.' },
    { t:'Testing and Validation', b:'After each migration batch, thorough testing is performed — functional testing (does it work?), performance testing (is it fast enough?), security testing (is data protected?), and disaster recovery testing (can we restore if something fails?). Issues are fixed before proceeding. Automated testing frameworks can significantly accelerate the testing phase and improve consistency.' },
    { t:'Go-Live and Optimization', b:'Once testing is complete and all workloads are migrated, the organization goes live on cloud. Post-migration, cost optimization is done by rightsizing resources, implementing auto-scaling, and using reserved instances to reduce costs. Continuous monitoring is established for ongoing management. Cloud cost management tools like AWS Cost Explorer or Azure Cost Management help track and optimize spending.' }
  ]
},

// QB Q14
{ type:'question', chap:'Question Bank', qbank:true, q:'QB14. What is an Operating System?',
  intro:`An Operating System (OS) is the most fundamental software that manages all the hardware and software resources of a computer. It acts as an intermediary between the user and the computer hardware. Without an OS, a computer cannot function — it would just be a collection of hardware with no way to run programs or interact with users. The OS provides a stable, consistent environment in which application software can run regardless of the specific underlying hardware.`,
  points:[
    { t:'Definition', b:'An Operating System is system software that manages computer hardware and software resources and provides common services for computer programs. Examples include Windows 11, macOS, Linux (Ubuntu, CentOS), Android, and iOS. Every computing device needs an OS to function. Modern OSes also include security features, networking stacks, and graphical interfaces.' },
    { t:'Process Management', b:'The OS manages all running programs (processes). It schedules which process uses the CPU and for how long, handles creating and terminating processes, and ensures processes do not interfere with each other. The process scheduler ensures fair and efficient CPU usage. Modern OSes use preemptive multitasking to run many processes seemingly simultaneously.' },
    { t:'Memory Management', b:'The OS manages RAM allocation — deciding which parts of memory are given to which programs. It handles virtual memory (using disk space as extended RAM), prevents programs from accessing each other\'s memory, and frees memory when programs finish running. Memory protection is a critical security feature that prevents one application from crashing or corrupting another.' },
    { t:'File System Management', b:'The OS manages files and directories on storage devices. It provides a hierarchical file system structure, controls file permissions and access rights, handles reading/writing data to disks, and supports multiple file systems like NTFS, ext4, and FAT32. The OS also handles buffering and caching of disk I/O to improve performance.' },
    { t:'Device Management', b:'The OS communicates with hardware devices (keyboard, mouse, printer, network card) through device drivers. It provides a standard interface for programs to use hardware without needing to know the specific technical details of each device. Plug-and-play functionality in modern OSes automatically detects and configures newly connected devices.' },
    { t:'Types of OS', b:'Operating systems are categorized as Single-user (like desktop Windows), Multi-user (Linux servers), Real-time OS (used in embedded systems and robotics), Distributed OS (manages multiple networked computers), and Mobile OS (Android, iOS for smartphones and tablets). Each type is optimized for its specific use case and performance requirements.' }
  ]
},

// QB Q15
{ type:'question', chap:'Question Bank', qbank:true, q:'QB15. Explain Users & Groups Administration in Linux.',
  intro:`In Linux, every resource (file, process, device) has an owner. Users and groups are the mechanism Linux uses to control who can access what. Proper user and group management is essential for system security. Linux has a root user (superuser with full access) and regular users with limited permissions based on their group memberships. Well-designed user and group policies are the foundation of a secure Linux system.`,
  points:[
    { t:'Linux Users', b:'Every Linux user has a unique username and User ID (UID). User information is stored in <span class="code-inline">/etc/passwd</span> and passwords (encrypted) in <span class="code-inline">/etc/shadow</span>. The root user (UID 0) has unrestricted access to everything on the system. System users (UID < 1000) are created by the OS for running services and should not be used for interactive logins.' },
    { t:'Linux Groups', b:'Groups are collections of users. Every file has a group owner. Users in the same group share the same file access permissions. Group information is stored in <span class="code-inline">/etc/group</span>. Each user has a primary group and can belong to multiple secondary groups. Groups are used to grant teams access to shared directories without giving everyone individual permissions.' },
    { t:'Creating and Managing Users', b:'<span class="code-inline">useradd username</span> creates a user. <span class="code-inline">passwd username</span> sets the password. <span class="code-inline">usermod</span> modifies user settings. <span class="code-inline">userdel username</span> deletes a user. The <span class="code-inline">-m</span> flag with useradd creates a home directory. Use <span class="code-inline">userdel -r</span> to also remove the user\'s home directory when deleting an account.' },
    { t:'Creating and Managing Groups', b:'<span class="code-inline">groupadd groupname</span> creates a group. <span class="code-inline">groupdel groupname</span> deletes a group. <span class="code-inline">usermod -aG groupname username</span> adds a user to a group. <span class="code-inline">groups username</span> shows which groups a user belongs to. Always use the <span class="code-inline">-aG</span> flags together to append without overwriting existing memberships.' },
    { t:'File Permissions', b:'Linux file permissions use three levels: Owner (u), Group (g), and Others (o). Each level has three permissions: Read (r=4), Write (w=2), Execute (x=1). The <span class="code-inline">chmod</span> command changes permissions and <span class="code-inline">chown</span> changes file ownership. The sticky bit and setuid/setgid permissions provide additional access control for special cases.' },
    { t:'sudo Access', b:'The <span class="code-inline">sudo</span> command allows regular users to run commands with superuser privileges without logging in as root. Users must be added to the sudo group or listed in <span class="code-inline">/etc/sudoers</span> to use sudo. This improves security over direct root login. The <span class="code-inline">/etc/sudoers</span> file can be configured to restrict which commands each user can run with sudo.' }
  ]
},

// QB Q16
{ type:'question', chap:'Question Bank', qbank:true, q:'QB16. What is Task Scheduling in Linux?',
  intro:`Task scheduling in Linux allows administrators and users to run commands, scripts, or programs automatically at specified times or regular intervals without manual intervention. This is extremely useful for automating routine tasks like backups, log cleanups, system updates, and report generation. Linux provides two main tools for task scheduling: cron and at. Proper use of task scheduling reduces manual work and ensures critical maintenance tasks are never forgotten.`,
  points:[
    { t:'cron – Recurring Tasks', b:'<span class="code-inline">cron</span> is a time-based job scheduler that runs tasks at regular intervals. It reads scheduled jobs from a file called crontab (cron table). Each user and root have their own crontab. The cron daemon runs in the background and checks for scheduled jobs every minute. Any script or command that can be run manually can also be scheduled with cron.' },
    { t:'crontab Syntax', b:'A crontab entry has 5 time fields followed by the command: <span class="code-inline">minute hour day month weekday command</span>. For example, <span class="code-inline">0 2 * * * /backup.sh</span> runs the backup script every day at 2:00 AM. <span class="code-inline">*</span> means every unit of that field. Websites like crontab.guru help visualize and validate cron expressions easily.' },
    { t:'Managing crontab', b:'<span class="code-inline">crontab -e</span> opens the current user\'s crontab for editing. <span class="code-inline">crontab -l</span> lists all scheduled jobs. <span class="code-inline">crontab -r</span> removes all cron jobs. System-wide cron jobs are placed in <span class="code-inline">/etc/cron.d/</span> or <span class="code-inline">/etc/crontab</span>. Output from cron jobs is emailed to the user by default unless redirected to a file or /dev/null.' },
    { t:'at – One-Time Tasks', b:'The <span class="code-inline">at</span> command schedules a task to run once at a specific future time. For example: <span class="code-inline">at 10:30 PM tomorrow</span> then type the command. Unlike cron, <span class="code-inline">at</span> is for non-recurring, one-time scheduled tasks. The <span class="code-inline">atq</span> command lists pending at jobs and <span class="code-inline">atrm</span> removes them.' },
    { t:'systemd Timers', b:'Modern Linux systems using systemd have systemd timers as an alternative to cron. Timers are more flexible and can be monitored with <span class="code-inline">systemctl list-timers</span>. Many system maintenance tasks on modern Linux distributions use systemd timers instead of cron. Systemd timers also support monotonic schedules (e.g., run 5 minutes after boot) which cron cannot do.' },
    { t:'Use Cases', b:'Common uses of task scheduling include automated backups, log rotation, database maintenance, sending scheduled reports, system updates (patching), cleaning temporary files, certificate renewal (like Let\'s Encrypt certificates), and scheduled application-specific tasks. Automating these tasks ensures consistency, reduces human error, and frees administrators for more strategic work.' }
  ]
},

// QB Q17
{ type:'question', chap:'Question Bank', qbank:true, q:'QB17. Explain Installing & Managing Packages in Linux.',
  intro:`In Linux, software is distributed as packages — bundles of compiled software along with installation scripts and configuration files. Package managers automate the process of downloading, installing, updating, and removing software. Different Linux distributions use different package formats and managers, but the core concept is the same across all of them. Understanding package management is a fundamental skill for any Linux administrator or developer.`,
  points:[
    { t:'Package Formats', b:'Linux uses two main package formats: RPM (Red Hat Package Manager) used by RHEL, CentOS, and Fedora, and DEB format used by Debian, Ubuntu, and Linux Mint. Each format has its own package manager but the concepts are identical. RPM and DEB packages contain the compiled binaries, configuration files, and metadata about the software and its dependencies.' },
    { t:'APT (Debian/Ubuntu)', b:'APT (Advanced Package Tool) is used on Debian-based systems. Key commands: <span class="code-inline">apt install package</span> to install, <span class="code-inline">apt remove package</span> to remove, <span class="code-inline">apt update</span> to refresh package lists, <span class="code-inline">apt upgrade</span> to upgrade all packages. Always run <span class="code-inline">apt update</span> before installing new software to ensure you get the latest version.' },
    { t:'YUM/DNF (RHEL/CentOS)', b:'YUM (and its successor DNF) is used on Red Hat-based systems. Key commands: <span class="code-inline">yum install package</span> to install, <span class="code-inline">yum remove package</span> to remove, <span class="code-inline">yum update</span> to update. DNF uses the same syntax as YUM but with improved performance and a more reliable dependency solver. RHEL 8 and later use DNF exclusively.' },
    { t:'Package Repositories', b:'Package managers download software from online repositories — trusted servers that host package files. Repositories are configured in files under <span class="code-inline">/etc/apt/sources.list</span> (Debian) or <span class="code-inline">/etc/yum.repos.d/</span> (RHEL). Additional third-party repositories can be added for more software. Always verify the authenticity and trustworthiness of third-party repositories before adding them.' },
    { t:'Dependency Resolution', b:'One of the main advantages of package managers is automatic dependency resolution. If software A requires library B and C, the package manager automatically downloads and installs B and C before installing A. This prevents "dependency hell" where software fails to install due to missing libraries. Modern package managers also detect and resolve conflicts between incompatible packages.' },
    { t:'Manual Installation', b:'Software can also be installed manually using RPM (<span class="code-inline">rpm -ivh package.rpm</span>) or DPKG (<span class="code-inline">dpkg -i package.deb</span>), or compiled from source code using <span class="code-inline">./configure && make && make install</span>. Manual installation does not handle dependencies automatically. Source compilation is used when a pre-built package is not available or custom build options are needed.' }
  ]
},

// QB Q18
{ type:'question', chap:'Question Bank', qbank:true, q:'QB18. Write a short note on Installing Server Components.',
  intro:`Installing server components in Linux involves setting up various services that allow a computer to function as a server — web server, database server, DNS server, mail server, and so on. Each server component is a separate software package with its own installation and configuration process. Linux is the most popular platform for servers due to its stability, security, and free licensing. Proper installation and configuration of server components requires understanding both the software and the underlying Linux system.`,
  points:[

// ============================================================
// AUDIO — Realistic book page-turn sound
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  return audioCtx;
}
function playSwipeSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const duration = 0.22;
    const sampleRate = ctx.sampleRate;
    const frameCount = Math.floor(sampleRate * duration);
    const buf = ctx.createBuffer(2, frameCount, sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buf.getChannelData(ch);
      for (let i = 0; i < frameCount; i++) {
        const t = i / sampleRate;
        const progress = i / frameCount;
        const noise = (Math.random() * 2 - 1);
        const env = Math.pow(Math.sin(Math.PI * progress), 0.6) * Math.pow(1 - progress, 1.2);
        const sweep = Math.sin(2 * Math.PI * (800 + 1200 * (1 - progress)) * t) * 0.06;
        const crinkle = Math.sin(2 * Math.PI * 3200 * t * (1 + progress)) * 0.04;
        data[i] = (noise * 0.55 + sweep + crinkle) * env * 0.45;
      }
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 600;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 7000;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(hp); hp.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch(e){}
}

// ============================================================
// BOOK ENGINE
// ============================================================
let currentPage = 0;
const totalPages = pages.length;
let isAnimating = false;

function renderPage(data, index) {
  const div = document.createElement('div');
  div.className = 'page';
  div.dataset.index = index;

  if (data.type === 'chapter') {
    div.classList.add('chapter-page');
    div.innerHTML = `
      <div class="chapter-content">
        <div class="chapter-roman">${data.roman}</div>
        <span class="chapter-num-label">${data.num}</span>
        <div class="chapter-title">${data.title.replace('\n','<br>')}</div>
        <div class="chapter-divider"></div>
        <div class="chapter-desc">${data.desc}</div>
      </div>
      <div class="chapter-swipe-hint">SWIPE RIGHT TO BEGIN →</div>
    `;
  } else {
    let html = '';
    if (data.qbank) html += `<div class="qbank-tag">TYBCA · Question Bank</div>`;
    html += `<div class="q-label">Question</div>`;
    html += `<div class="question">${data.q}</div>`;
    html += `<strong class="ans-label">ANS)</strong>`;
    html += `<div class="intro">${data.intro}</div>`;

    if (data.points) {
      data.points.forEach((p, i) => {
        html += `<div class="point">
          <div class="point-title" data-num="${i+1}.">${p.t}</div>
          <div class="point-body">${p.b}</div>
        </div>`;
      });
    } else if (data.steps) {
      data.steps.forEach(s => {
        html += `<div class="step">
          <div class="step-num">${s.n}</div>
          <div class="step-body">${s.b}</div>
        </div>`;
      });
    }

    div.innerHTML = `
      <div class="page-header">
        <span class="page-chapter-tag">${data.chap}</span>
        <span class="page-num">${index + 1} / ${totalPages}</span>
      </div>
      <div class="page-content">${html}</div>
    `;
  }
  return div;
}

function buildBook() {
  const wrapper = document.getElementById('zoom-wrapper');
  pages.forEach((p, i) => {
    wrapper.appendChild(renderPage(p, i));
  });
  buildNavPanel();
  showPage(0, null);
}

function buildNavPanel() {
  const container = document.getElementById('nav-items-container');
  container.innerHTML = '';
  let lastChap = '';
  pages.forEach((p, i) => {
    if (p.type === 'chapter') {
      if (lastChap) {
        const sep = document.createElement('div');
        sep.style.height = '6px';
        container.appendChild(sep);
      }
      lastChap = p.num;
      const item = document.createElement('div');
      item.className = 'nav-item chapter-nav';
      item.dataset.idx = i;
      item.innerHTML = `<div class="nav-item-num" style="font-size:8px">${p.roman || '✦'}</div><div class="nav-item-label">${p.num}</div>`;
      item.onclick = () => { jumpTo(i); closeNav(); };
      container.appendChild(item);
    } else {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.idx = i;
      const qShort = p.q.replace(/^(Q\d+\.|QB\d+\.)\s*/,'').substring(0,38) + (p.q.length > 45 ? '…' : '');
      item.innerHTML = `<div class="nav-item-num">${i + 1}</div><div class="nav-item-label">${qShort}</div>`;
      item.onclick = () => { jumpTo(i); closeNav(); };
      container.appendChild(item);
    }
  });
}

function showPage(idx, direction) {
  if (isAnimating && direction !== null) return;
  const allPages = document.querySelectorAll('#zoom-wrapper .page');
  const currentEl = document.querySelector('#zoom-wrapper .page.active');
  const nextEl = allPages[idx];
  if (!nextEl || nextEl === currentEl) return;

  isAnimating = true;
  if (direction !== null) playSwipeSound();

  if (currentEl && direction !== null) {
    const outClass = direction > 0 ? 'flip-out-left' : 'flip-out-right';
    currentEl.classList.add(outClass);
    currentEl.addEventListener('animationend', () => {
      currentEl.classList.remove('active', outClass);
    }, { once: true });
  } else if (currentEl) {
    currentEl.classList.remove('active');
  }

  nextEl.classList.add('active');
  if (direction !== null) {
    const inClass = direction > 0 ? 'flip-in-right' : 'flip-in-left';
    nextEl.classList.add(inClass);
    nextEl.addEventListener('animationend', () => {
      nextEl.classList.remove(inClass);
      isAnimating = false;
    }, { once: true });
  } else {
    isAnimating = false;
  }

  const content = nextEl.querySelector('.page-content');
  if (content) content.scrollTop = 0;

  currentPage = idx;
  updateNav();
}

function goPage(dir) {
  const next = currentPage + dir;
  if (next < 0 || next >= totalPages) return;
  showPage(next, dir);
}

function jumpTo(idx) {
  const dir = idx > currentPage ? 1 : -1;
  showPage(idx, dir);
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage === totalPages - 1;

  const p = pages[currentPage];
  const label = p.type === 'chapter' ? p.num : `${p.chap} · ${currentPage + 1}/${totalPages}`;
  document.getElementById('nav-label').textContent = label;

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === currentPage);
  });
}

function openBook() {
  const cover = document.getElementById('cover');
  cover.classList.add('open');
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('menu-btn').style.display = 'flex';
  document.getElementById('zoom-controls').style.display = 'flex';

  setTimeout(() => {
    const hint = document.getElementById('swipe-hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 3000);
  }, 1000);
}

function toggleNav() {
  const panel = document.getElementById('nav-panel');
  const overlay = document.getElementById('nav-overlay');
  const btn = document.getElementById('menu-btn');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  btn.classList.toggle('active', !isOpen);
}
function closeNav() {
  document.getElementById('nav-panel').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('show');
  document.getElementById('menu-btn').classList.remove('active');
}

// SWIPE
let touchStartX = 0, touchStartY = 0, touchTime = 0;
let scrollLocked = false;

document.getElementById('book').addEventListener('touchstart', e => {
  if (e.touches.length > 1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchTime = Date.now();
  scrollLocked = false;
}, { passive: true });

document.getElementById('book').addEventListener('touchmove', e => {
  if (e.touches.length > 1) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!scrollLocked && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 8) {
    scrollLocked = true;
  }
}, { passive: true });

document.getElementById('book').addEventListener('touchend', e => {
  if (e.changedTouches.length > 1 || scrollLocked) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchTime;
  const velocity = Math.abs(dx) / dt;
  if (Math.abs(dx) > Math.abs(dy) && (Math.abs(dx) > 45 || velocity > 0.3)) {
    if (dx < 0) goPage(1);
    else goPage(-1);
  }
}, { passive: true });

// PINCH ZOOM
let pinchStartDist = 0;
let currentScale = 1;
let baseScale = 1;

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

document.getElementById('book').addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchStartDist = getPinchDist(e.touches);
    baseScale = currentScale;
  }
}, { passive: true });

document.getElementById('book').addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = getPinchDist(e.touches);
    const scale = Math.min(3, Math.max(1, baseScale * (dist / pinchStartDist)));
    currentScale = scale;
    applyZoom(scale);
    e.preventDefault();
  }
}, { passive: false });

document.getElementById('book').addEventListener('touchend', e => {
  if (e.touches.length < 2 && currentScale < 1.1) {
    currentScale = 1;
    applyZoom(1);
  }
}, { passive: true });

function applyZoom(scale) {
  const w = document.getElementById('zoom-wrapper');
  w.style.transition = 'transform 0.1s';
  w.style.transformOrigin = 'top center';
  w.style.transform = `scale(${scale})`;
}

function zoomIn() { currentScale = Math.min(3, currentScale + 0.25); applyZoom(currentScale); }
function zoomOut() { currentScale = Math.max(1, currentScale - 0.25); applyZoom(currentScale); }
function zoomReset() { currentScale = 1; applyZoom(1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPage(-1);
  if (e.key === 'Escape') closeNav();
});

buildBook();
</script>
